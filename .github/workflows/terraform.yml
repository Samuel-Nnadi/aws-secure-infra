name: Terraform CI

# Validates formatting, initialization, syntax, and security posture on every
# push and pull request to main. No AWS credentials are required: `init` runs
# with -backend=false and `validate` does not contact AWS.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      # Fail if any file is not canonically formatted.
      - name: Terraform fmt
        run: terraform fmt -check -recursive -diff

      # Initialize providers without configuring a backend (no state access).
      - name: Terraform init
        run: terraform init -backend=false

      # Validate the configuration is internally consistent and type-correct.
      - name: Terraform validate
        run: terraform validate

  security-scan:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Scan the Terraform for misconfigurations. Trivy is the maintained
      # successor to standalone tfsec and needs no credentials.
      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          # Fail the job only on high/critical findings; the dev baseline has a
          # couple of documented, intentional trade-offs (see README) that would
          # otherwise be flagged at lower severities.
          severity: HIGH,CRITICAL
          exit-code: "1"
